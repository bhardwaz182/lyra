<svg viewBox="0 0 80 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="50%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>

  <!-- Left outer arm curving up and outward -->
  <path d="M28,46 C16,38 12,22 18,10 C21,4 26,2 30,4"
    fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right outer arm -->
  <path d="M52,46 C64,38 68,22 62,10 C59,4 54,2 50,4"
    fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Top crossbar -->
  <line x1="18" y1="33" x2="62" y2="33"
    stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>

  <!-- 5 strings -->
  <line x1="30" y1="33" x2="30" y2="70" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="35" y1="33" x2="34" y2="75" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="40" y1="33" x2="40" y2="77" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="45" y1="33" x2="46" y2="75" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="50" y1="33" x2="50" y2="70" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Inner body left curve (bulging out) -->
  <path d="M28,46 C20,54 20,65 26,72 C30,77 36,79 40,79"
    fill="none" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Inner body right curve -->
  <path d="M52,46 C60,54 60,65 54,72 C50,77 44,79 40,79"
    fill="none" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Crossing arc at lower body -->
  <path d="M28,46 C34,60 46,60 52,46"
    fill="none" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Dots at key joints -->
  <circle cx="18" cy="33" r="3" fill="#38bdf8"/>
  <circle cx="62" cy="33" r="3" fill="#38bdf8"/>
  <circle cx="28" cy="46" r="2.5" fill="#38bdf8"/>
  <circle cx="52" cy="46" r="2.5" fill="#38bdf8"/>
  <circle cx="40" cy="79" r="2.5" fill="#38bdf8"/>
</svg>
